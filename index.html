<html>

<head>
  <!-- Load A-Frame Framework -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@3.0.3/dist/aframe-event-set-component.min.js"></script>
</head>

<body>
  <div id="qr-container" style="position: fixed; bottom: 20px; left: 20px; z-index: 1000;">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://aframe-demo-seven.vercel.app/"
      alt="Open demo"
      style="width: 120px; height: 120px; border: 2px solid #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.2); background: #fff;" />
  </div>

  <a-scene>
    <!-- <a-assets>
      <a-asset-item id="myModel" src="assets/Robot/Robot_73_V01.gltf"></a-asset-item>
    </a-assets> -->

    <!-- Box -->
    <a-box color="#2196F3" position="0 0.5 -5" rotation="0 45 0" shadow="receive: true"
      animation="property: rotation; to: 0 360 0; dur: 15000; easing: linear; repeat: indefinite"
      event-set__down="_event: mousedown; scale: 1.2 1.2 1.2" event-set__up="_event: mouseup; scale: 1 1 1">
    </a-box>

    <!-- Ground -->
    <a-plane color="#7BC8A4" position="0 0 -5" rotation="-90 0 0" width="4" height="4"
      event-set__down="_event: click; material.wireframe: true"
      event-set__leave="_event: mouseleave; material.wireframe: false"></a-plane>

    <!-- Wall -->
    <a-plane id="redPlane" position="0 3.5 -7" radius="0.5" width="2" height="2" color="#EF2D5E"
      event-set__enter="_event: click; _target: #posterText; visible: true"
      event-set__leave="_event: mouseleave; _target: #posterText; visible: false">
      <a-text id="posterText" value="U Clicked Me!" align="center" color="white" visible="false"
        position="0 0 0.2"></a-text>
    </a-plane>

    <!-- Add a Camera and cursor -->
    <a-camera position="0 1.8 0" jump>
      <a-cursor color="white"></a-cursor>
    </a-camera>

    <!-- white Directional light -->
    <a-entity light="type:directional; castShadow:true;" position="-4 10 7"></a-entity>

    <!-- Blue Fill light -->
    <a-light type="point" color="lightwhite" position="-4 10 5"></a-light>

    <!-- Ambient lighting -->
    <a-light type="ambient" color="#777"></a-light>

    <a-sky color="grey"></a-sky>

    <!-- <a-entity gltf-model="#myModel" animation-mixer position="4 2.5 -3" scale="1 1 1">
    </a-entity> -->

  </a-scene>
