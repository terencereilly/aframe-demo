<html>

<head>
  <!-- Load A-Frame Framework -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-event-set-component@3.0.3/dist/aframe-event-set-component.min.js"></script>
  <style>
    @media (max-width: 600px) {
      #qr-container {
        display: none;
      }
    }
  </style>
</head>

<body>

  <a-scene>
    <a-assets>
      <video id="city360" src="assets/360_city.mp4" autoplay loop="true" crossorigin="anonymous" webkit-playsinline
        playsinline></video>
    </a-assets>
    <!-- Box -->
    <a-box color="#2196F3" position="0 0.5 -5" rotation="0 45 0" shadow="receive: true"
      animation="property: rotation; to: 0 360 0; dur: 15000; easing: linear; repeat: indefinite"
      event-set__down="_event: mousedown; scale: 1.2 1.2 1.2" event-set__up="_event: mouseup; scale: 1 1 1">
    </a-box>

    <!-- Ground -->
    <a-plane color="#7BC8A4" position="0 0 -5" rotation="-90 0 0" width="4" height="4"></a-plane>

    <!-- Wall -->
    <a-plane id="redPlane" position="0 3.5 -7" radius="0.5" width="2" height="2" color="#EF2D5E"></a-plane>

    <!-- Add a Camera and cursor -->
    <a-camera position="0 1.8 0" jump><a-cursor color="white"></a-cursor></a-camera>

    <!-- white Directional light -->
    <a-entity light="type:directional; castShadow:true;" position="-4 10 7"></a-entity>

    <!-- Blue Fill light -->
    <a-light type="point" color="lightwhite" position="-4 10 5"></a-light>

    <!-- Ambient lighting -->
    <a-light type="ambient" color="#777"></a-light>

    <a-videosphere src="#city360"></a-videosphere>

  </a-scene>

  <script>
    document.querySelector('a-scene').addEventListener('click', function () {
      var video = document.querySelector('#city360');
      if (video.paused) video.play();
    });
  </script>

  <!-- QR Code for mobile access -->
  <div id="qr-container"
    style="position: absolute; bottom: 20px; left: 20px; z-index: 10; background: white; padding: 8px; border-radius: 8px;">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://aframe-demo-seven.vercel.app/"
      alt="QR Code to open on mobile" width="120" height="120">
  </div>

</body>

</html>
