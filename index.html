<html>
  <head>
    <!-- Load A-Frame Framework -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<!--     <script src="https://unpkg.com/aframe-event-set-component@3.0.3/dist/aframe-event-set-component.min.js"></script>
 -->
  </head>
  
  <body>
    
    <a-scene>

      <!-- Box -->
      <a-box
        color="#FFC65D"
        position="0 0.5 -5"
        rotation="0 45 0"
        shadow="receive: true"
        animation="property: rotation; to: 0 360 0; dur: 15000; easing: linear; repeat: indefinite"
       >
      </a-box>
      
       <!-- Ground -->
      <a-plane
        color="#7BC8A4"
        position="0 0 -5"
        rotation="-90 0 0"
        width="4"
        height="4"
      ></a-plane>
      
      <!-- Wall -->
      <a-plane
        position="0 3.5 -7"
        radius="0.5"
        width="2"
        height="2"
        color="#EF2D5E"
      >
        <a-text
          id="posterText"
          value="U Clicked Me!"
          align="center"
          color="white"
          visible="false"
          position="0 0 0.2"
        ></a-text>
      </a-plane>   

      <!-- Add a Camera and cursor -->
      <a-camera position="0 1.8 0">
        <a-cursor color="white"></a-cursor>
      </a-camera>

      <!-- white Directional light -->
      <a-entity
        light="type:directional; castShadow:true;"
        position="-6 10 7"
      ></a-entity>

      <!-- Blue Fill light -->
      <a-light type="point" color="lightblue" position="-7 0 2"></a-light>

      <!-- Ambient lighting -->
      <a-light type="ambient" color="#333"></a-light>

      <a-sky color="#ECECEC"></a-sky>
    </a-scene>
    
    
    
  </body>
</html>
