<html>
  <head>
    <!-- Load A-Frame Framework -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <!-- Add Event Set Component and rename after -->
    <script src="https://unpkg.com/aframe-event-set-component@3.0.3/dist/aframe-event-set-component.min.js"></script>
  </head>
  
  <body>
    
    <a-scene>
      
      <!-- Load all my assets -->
      <a-assets>
        <img
          id="texture01"
          src="https://cdn.glitch.com/e1692e96-b543-451a-b75d-36e0b3b850e7%2FChecker_Texture_V01.jpg?1550581281017"
        />
      </a-assets>
      
      <!-- Ground Plane -->
      <a-plane
        src=""
        color="#7BC8A4"
        position="0 0 -5"
        rotation="-90 0 0"
        width="4"
        height="4"
        event-set__down="_event: click; material.wireframe: true"
        event-set__up="_event: mouseup; material.wireframe: false"
        event-set__leave="_event: mouseleave; material.wireframe: false"
      ></a-plane>

      <!-- Add a Box and animate it spinning -->
      <!-- src="#texture01" -->
      <a-box
        color="#FFC65D"
        position="0 0.5 -5"
        rotation="0 45 0"
        shadow="receive: true"
        animation="property: rotation; to: 0 360 0; dur: 15000; easing: linear; repeat: indefinite"
        event-set__down="_event: mousedown; scale: 1.2 1.2 1.2"
        event-set__up="_event: mouseup; scale: 1 1 1"
        event-set__leave="_event: mouseleave; scale: 1 1 1"
      >
      </a-box>
      
      <a-plane
        position="0 3.5 -7"
        radius="0.5"
        width="2"
        height="2"
        color="#EF2D5E"
        event-set__enter="_event: click; _target: #cylinderText; visible: true"
        event-set__leave="_event: mouseleave; _target: #cylinderText; visible: false"
      >
        <a-text
          id="cylinderText"
          value="U Clicked Me!"
          align="center"
          color="white"
          visible="false"
          position="0 0 0.2"
        ></a-text>
      </a-plane>   

      <!-- Add a Camera and cursor -->
      <a-camera position="0 1.8 0">
        <a-cursor color="white"></a-cursor>
      </a-camera>

      <!-- Add Lights -->
      <!-- white Directional light -->
      <a-entity
        light="type:directional; castShadow:true;"
        position="-6 10 7"
      ></a-entity>

      <!-- Blue Fill light -->
      <a-light type="point" color="lightblue" position="-7 0 2"></a-light>

      <!-- Ambient lighting -->
      <a-light type="ambient" color="#333"></a-light>

      <a-sky color="#ECECEC"></a-sky>
    </a-scene>
    
  </body>
</html>
