<html>
  <head>
    <script src="https://aframe.io/releases/0.9.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      
      <a-assets>
        <img id="texture01" src="https://cdn.glitch.com/e1692e96-b543-451a-b75d-36e0b3b850e7%2FChecker_Texture_V01.jpg?1550581281017"></img>
        <img id="texture02" src="https://cdn.glitch.com/e1692e96-b543-451a-b75d-36e0b3b850e7%2Fgradient4.jpg?1550581302058"></img>
        <img id="texture03" src="https://cdn.glitch.com/e1692e96-b543-451a-b75d-36e0b3b850e7%2FBronze_Dirt_Texture_01_V01.jpg?1550581286437"></img>
        <img id="texture04" src="https://cdn.glitch.com/e1692e96-b543-451a-b75d-36e0b3b850e7%2FBlurred_Image_01_V01.jpg?1550581794421"></img>  


      </a-assets>

  
      <a-box position="-1 0.5 -3" 
             rotation="0 45 0" 
             src="#texture02"></a-box>
    
      <a-sphere position="0 1.25 -5" 
                radius="1.25" 
                src="#texture01"></a-sphere>
    
      <a-cylinder position="1 0.75 -3" 
                  radius="0.5" 
                  height="1.5" 
                  src="#texture04"></a-cylinder>
  
      <a-plane position="0 0 -4" 
               rotation="-90 0 0" 
               width="4" height="4" 
               src="#texture03"></a-plane>

<a-entity fog="color: #dadada; density: 100"></a-entity>
  
      <a-sky color="black"></a-sky>
  
      
    </a-scene>
  </body>
</html>
